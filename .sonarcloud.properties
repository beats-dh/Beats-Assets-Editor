# SonarCloud Automatic Analysis configuration.
#
# Exclude the i18n translation tables from copy-paste (duplication) detection.
# src/i18n.ts holds parallel pt-BR/en/es/ru dictionaries with identical key
# structures, which CPD reports as ~44% duplication (it accounts for ~98% of all
# duplicated lines in this PR). That repetition is inherent to translation data
# and not meaningfully de-duplicable, so scope CPD to the rest of the codebase.
sonar.cpd.exclusions=src/i18n.ts
