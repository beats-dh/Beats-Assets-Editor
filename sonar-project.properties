# Copy-paste (duplication) detection exclusions.
#
# These modules contain intentional, structural repetition that the CPD engine
# flags as duplication but which isn't meaningfully de-duplicable without hurting
# readability:
#   * Lua generators emit each field explicitly, line by line.
#   * Parsers/writers (Lua/QM/RCC) repeat the same read-field/emit-field shape.
#   * Category-based command handlers repeat one match arm per AppearanceCategory
#     (Objects/Outfits/Effects/Missiles).
#   * The DAT/static(map)data merge modules share an analogous merge skeleton.
# Excluding them from duplication density keeps the quality gate focused on
# genuinely refactorable duplication in the rest of the codebase.
sonar.cpd.exclusions=\
  src-tauri/src/features/monsters/commands/io.rs,\
  src-tauri/src/features/npcs/commands/io.rs,\
  src-tauri/src/features/npcs/commands/sync.rs,\
  src-tauri/src/features/monsters/parsers/lua_parser.rs,\
  src-tauri/src/features/npcs/parsers/lua_parser.rs,\
  src-tauri/src/features/qm/qm_parser.rs,\
  src-tauri/src/features/qm/commands.rs,\
  src-tauri/src/features/rcc/rcc_parser.rs,\
  src-tauri/src/features/rcc/rcc_writer.rs,\
  src-tauri/src/features/rcc/commands.rs,\
  src-tauri/src/features/appearances/commands/import_export.rs,\
  src-tauri/src/features/appearances/commands/update.rs,\
  src-tauri/src/features/appearances/commands/query.rs,\
