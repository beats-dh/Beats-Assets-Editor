name: Rustfmt Auto

permissions:
  contents: write

# Cancela execuções antigas quando chega um commit novo. Usa o número da PR
# para eventos pull_request (evita que PRs distintas com o mesmo nome de branch
# — ex.: forks — cancelem umas às outras) e o ref para push/dispatch.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || format('ref-{0}', github.ref_name) }}
  cancel-in-progress: true

on:
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "src-tauri/**"
      - "src-tauri/Cargo.toml"
      - "src-tauri/Cargo.lock"
  push:
    branches-ignore:
      - main
    paths:
      - "src/**"
      - "tests/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "src-tauri/**"
      - "src-tauri/Cargo.toml"
      - "src-tauri/Cargo.lock"
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch ou tag para formatar (ex.: main)."
        required: false
      dry_run:
        description: "Se true, roda --check (sem commit)."
        required: false
        default: "false"

jobs:
  rustfmt-auto:
    runs-on: ubuntu-latest

    steps:
      - name: Set up Git identity
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "GitHub Actions"

      - name: Checkout (pull_request → head ref; outros → ref padrão)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.event.inputs.ref || github.ref }}
          repository: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust (stable + rustfmt)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: rustfmt

      - name: Cache cargo/target
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: src-tauri

      - name: rustfmt --check (dry-run)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: rustfmt (auto fix)
        if: ${{ github.event.inputs.dry_run != 'true' }}
        working-directory: src-tauri
        run: cargo fmt --all

      - name: Commit formatted code
        if: ${{ github.event.inputs.dry_run != 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        uses: EndBug/add-and-commit@a94899bca583c204427a224a7af87c02f9b325d5 # v9.1.4
        with:
          author_name: GitHub Actions
          author_email: github-actions[bot]@users.noreply.github.com
          message: "Code format - (rustfmt)"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
