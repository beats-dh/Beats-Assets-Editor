name: Tauri Build Debug (Linux)

# Cancela builds antigas quando chega um commit novo. Usa o número da PR para
# eventos pull_request (evita que PRs distintas com o mesmo nome de branch —
# ex.: forks — cancelem umas às outras) e o ref para workflow_dispatch.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || format('ref-{0}', github.ref_name) }}
  cancel-in-progress: true

on:
  # Build on PRs only (covers same-repo and fork PRs) plus manual dispatch.
  # Dropping the push trigger avoids the duplicate push+pull_request build that
  # ran on every commit to a branch with an open PR.
  pull_request:
    paths:
      - "src/**"
      - "src-tauri/**"
      - "package.json"
      - "package-lock.json"
      - "vite.config.*"
      - "src-tauri/Cargo.toml"
      - "src-tauri/Cargo.lock"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tauri-build-debug-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (PR → head; outros → ref)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
          repository: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install frontend deps
        run: npm ci

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # ubuntu-latest is 24.04, which ships libwebkit2gtk-4.1-dev. Caching the
      # .deb downloads + install avoids ~40-60s of apt work on every run.
      - name: Install Linux system deps for Tauri (cached)
        uses: awalsh128/cache-apt-pkgs-action@acb598e5ddbc6f68a970c5da0688d2f3a9f04d05 # v1.6.0
        with:
          packages: libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf pkg-config
          version: 1.0

      - name: Cache cargo/target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          # Keep the dependency cache even when the build fails, so a retry
          # (or the next push) doesn't recompile everything from scratch.
          cache-on-failure: true

      # PRs only need to verify it compiles, so skip the (slow) bundling step.
      # Manual dispatch still produces the full bundle for download.
      - name: Build Tauri (debug)
        run: npm run tauri build -- --debug ${{ github.event_name == 'pull_request' && '--no-bundle' || '' }}

      - name: Upload debug bundle
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/upload-artifact@v4
        with:
          name: tauri-debug-bundle-linux
          path: src-tauri/target/debug/bundle
