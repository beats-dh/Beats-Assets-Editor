name: Tauri Build Release (Linux)
permissions:
  contents: read

# Cancela uma release em andamento quando chega um push novo no mesmo ref.
# (build-release só dispara em push para main, mas mantemos a chave consistente.)
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || format('ref-{0}', github.ref_name) }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "src-tauri/**"
      - "package.json"
      - "package-lock.json"
      - "vite.config.*"
      - "src-tauri/Cargo.toml"
      - "src-tauri/Cargo.lock"
  workflow_dispatch:

jobs:
  tauri-build-release-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install frontend deps
        run: npm ci

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # ubuntu-latest is 24.04, which ships libwebkit2gtk-4.1-dev. Caching the
      # .deb downloads + install avoids ~40-60s of apt work on every run.
      - name: Install Linux system deps for Tauri (cached)
        uses: awalsh128/cache-apt-pkgs-action@acb598e5ddbc6f68a970c5da0688d2f3a9f04d05 # v1.6.0
        with:
          packages: libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf pkg-config
          version: 1.0

      - name: Cache cargo/target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          # Keep the dependency cache even when the build fails.
          cache-on-failure: true

      - name: Build Tauri (release)
        run: npm run tauri build

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: tauri-release-bundle-linux
          path: src-tauri/target/release/bundle
